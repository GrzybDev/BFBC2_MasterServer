name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Install cross-compile tools
      run: |
       sudo apt-get update
       sudo apt-get install -y qemu-user-static binfmt-support
    
    - name: Login to Docker Registry
      run: echo ${{ secrets.REGISTRY_PASSWORD }} | docker login ${{ secrets.REGISTRY_URL }} -u action --password-stdin
    
    - name: Build and Push Docker image
      run: |
        docker pull ${{ secrets.REGISTRY_URL }}/emu/bfbc2:${{ github.event.before }} || true
        docker pull ${{ secrets.REGISTRY_URL }}/emu/bfbc2:latest || true
        docker buildx build --cache-from ${{ secrets.REGISTRY_URL }}/emu/bfbc2:${{ github.event.before }} --cache-from ${{ secrets.REGISTRY_URL }}/emu/bfbc2:latest -t ${{ secrets.REGISTRY_URL }}/emu/bfbc2:latest --cache-from type=gha --cache-to type=gha,mode=max -t ${{ secrets.REGISTRY_URL }}/emu/bfbc2:${GITHUB_SHA} --platform linux/arm64 .
        docker push ${{ secrets.REGISTRY_URL }}/emu/bfbc2:latest
        docker push ${{ secrets.REGISTRY_URL }}/emu/bfbc2:${GITHUB_SHA}
  
    - name: Deploy
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.PROD_HOST }}
        username: action
        key: ${{ secrets.PROD_KEY }}
        envs: GITHUB_SHA
        script: |
          docker service update --image ${{ secrets.REGISTRY_URL }}/emu/bfbc2:${GITHUB_SHA} emu_bfbc2_app
          docker exec $(docker ps -q -f name=emu_bfbc2_app) python manage.py migrate
        
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' }}
    permissions:
      actions: read
      contents: read
      security-events: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: "python"
        queries: security-extended,security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v2

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
